name: Aarya Telegram Bot Reply

on:
  schedule:
    # Run every 30 minutes, 24/7 including weekends
    - cron: '*/30 * * * *'
  workflow_dispatch:   # manual run from GitHub Actions tab

jobs:
  bot-reply:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet \
            yfinance pandas numpy requests \
            google-genai

      - name: Check and reply to Telegram messages
        run: python bot_poll.py
        env:
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_KEY:           ${{ secrets.GEMINI_KEY }}
          ALPHA_VANTAGE_KEY:    ${{ secrets.ALPHA_VANTAGE_KEY }}
          TWELVE_DATA_KEY:      ${{ secrets.TWELVE_DATA_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}

name: Aarya Background Monitor

on:
  schedule:
    # ── India market hours: NSE 9:15 AM–3:30 PM IST = 3:45–10:00 UTC ─
    # Hourly from 3:30 UTC to 10:00 UTC (every :30 past the hour)
    - cron: '30 3-9 * * 1-5'
    # ── US market hours: NYSE 9:30 AM–4 PM EDT = 13:30–20:00 UTC ─────
    # Hourly from 13:30 UTC to 20:00 UTC (every :30 past the hour)
    - cron: '30 13-19 * * 1-5'
    # ── Weekly performance report (Sunday 5:30 PM IST = 12:00 UTC) ───
    - cron: '0 12 * * 0'
  workflow_dispatch:   # manual run from GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet \
            yfinance pandas numpy requests \
            google-genai lxml html5lib beautifulsoup4 \
            scikit-learn scipy

      - name: Run monitor
        run: python monitor.py
        env:
          GH_SCHEDULE:          ${{ github.event.schedule }}
          ALPHA_VANTAGE_KEY:    ${{ secrets.ALPHA_VANTAGE_KEY }}
          TWELVE_DATA_KEY:      ${{ secrets.TWELVE_DATA_KEY }}
          GEMINI_KEY:           ${{ secrets.GEMINI_KEY }}
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:     ${{ secrets.EMAIL_RECIPIENTS }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Check Telegram messages
        run: python bot_poll.py
        env:
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_KEY:           ${{ secrets.GEMINI_KEY }}
          ALPHA_VANTAGE_KEY:    ${{ secrets.ALPHA_VANTAGE_KEY }}
          TWELVE_DATA_KEY:      ${{ secrets.TWELVE_DATA_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

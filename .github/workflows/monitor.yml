name: Aarya Background Monitor

on:
  schedule:
    # ── Indian market hours (IST = UTC+5:30) ──────────────────────────
    # 9:00 AM IST  — market open
    - cron: '30 3 * * 1-5'
    # 11:00 AM IST — mid-morning
    - cron: '30 5 * * 1-5'
    # 1:00 PM IST  — post-lunch
    - cron: '30 7 * * 1-5'
    # 3:00 PM IST  — near India close
    - cron: '30 9 * * 1-5'
    # ── US market hours (EDT = UTC-4, May–Oct) ────────────────────────
    # 7:00 PM IST  — US market open (9:30 AM EDT)
    - cron: '30 13 * * 1-5'
    # 11:00 PM IST — US mid-session
    - cron: '30 17 * * 1-5'
  workflow_dispatch:   # manual run from GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet \
            yfinance pandas numpy requests \
            google-genai lxml html5lib beautifulsoup4

      - name: Run monitor
        run: python monitor.py
        env:
          GH_SCHEDULE:          ${{ github.event.schedule }}
          ALPHA_VANTAGE_KEY:    ${{ secrets.ALPHA_VANTAGE_KEY }}
          TWELVE_DATA_KEY:      ${{ secrets.TWELVE_DATA_KEY }}
          GEMINI_KEY:           ${{ secrets.GEMINI_KEY }}
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:     ${{ secrets.EMAIL_RECIPIENTS }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Check Telegram messages
        run: python bot_poll.py
        env:
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_KEY:           ${{ secrets.GEMINI_KEY }}
          ALPHA_VANTAGE_KEY:    ${{ secrets.ALPHA_VANTAGE_KEY }}
          TWELVE_DATA_KEY:      ${{ secrets.TWELVE_DATA_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

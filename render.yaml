services:
  - type: worker
    name: aarya-telegram-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements_bot.txt
    startCommand: python telegram_bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GEMINI_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
